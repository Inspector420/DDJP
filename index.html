<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>DDJP</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <!-- Content-Security-Policy (Topic 3). Delivered via meta because GitHub Pages
       can't set HTTP headers. Blocks injected/unauthorized script execution and
       rogue embeds. Notes: connect-src must stay broad (https/wss) because the
       homeserver is user-chosen, so this hardens injection, not exfiltration —
       token lifetime is handled in Topic 5. frame-ancestors/report-* are header-
       only and can't be enforced via meta. style-src keeps 'unsafe-inline' for the
       page's inline <style> and style="" attributes (not the token-theft vector).
       'wasm-unsafe-eval' is required in script-src so the Rust crypto WASM can
       instantiate; without it initRustCrypto() fails and encrypted chat breaks.
       The 'sha256-…' allows VS Code Live Server's auto-reload script during local
       dev; it's inert in production (that script isn't present on GitHub Pages).
       Remove it if you don't use Live Server. -->
  <meta http-equiv="Content-Security-Policy" content="
    default-src 'none';
    script-src 'self' 'wasm-unsafe-eval' 'sha256-vvt4KWwuNr51XfE5m+hzeNEGhiOfZzG97ccfqGsPwvE=' https://www.youtube.com https://s.ytimg.com;
    frame-src https://www.youtube.com https://www.youtube-nocookie.com;
    img-src 'self' data: blob: https:;
    media-src 'self' blob:;
    style-src 'self' 'unsafe-inline';
    font-src 'self';
    connect-src 'self' https: wss:;
    worker-src 'self' blob:;
    object-src 'none';
    base-uri 'none';
    form-action 'none';
  ">
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; font-family: Arial, sans-serif; background: #111; color: #fff; }
    .screen { display: none; flex-direction: column; height: 100vh; }
    h2, h3 { margin: 0; }
    .muted { color: #888; font-size: 13px; }
    button { font-family: inherit; }

    /* login */
    #screen-login { align-items: center; justify-content: center; }
    .login-box { background: #222; border: 1px solid #444; border-radius: 8px; padding: 30px; width: 320px; display: flex; flex-direction: column; gap: 12px; }
    .login-box p { margin: 0; color: #aaa; font-size: 13px; }
    .login-box input { background: #333; border: 1px solid #555; border-radius: 4px; color: #fff; padding: 8px; font-size: 14px; width: 100%; }
    .login-box button { padding: 10px; border: none; border-radius: 4px; cursor: pointer; font-size: 14px; font-weight: bold; }
    #btn-login { background: #5865F2; color: #fff; }
    #login-error { color: #ff6b6b; font-size: 13px; display: none; }

    /* rooms */
    #screen-rooms { padding: 20px; gap: 16px; }
    .room-actions { display: flex; gap: 10px; }
    .room-actions input { flex: 1; background: #333; border: 1px solid #555; border-radius: 4px; color: #fff; padding: 8px; font-size: 14px; }
    .btn-primary { background: #5865F2; color: #fff; border: none; border-radius: 4px; padding: 10px 16px; cursor: pointer; font-size: 14px; font-weight: bold; }
    .btn-secondary { background: #333; color: #aaa; border: 1px solid #555; border-radius: 4px; padding: 10px 16px; cursor: pointer; font-size: 14px; }
    /* Encryption / recovery-key screens (Topic 2) */
    #screen-encryption { align-items: center; justify-content: center; }
    .enc-box { background: #1a1a1a; border: 1px solid #333; border-radius: 8px; padding: 24px; width: 380px; max-width: 90vw; display: flex; flex-direction: column; gap: 12px; }
    .enc-box-wide { width: 460px; }
    .enc-box h2 { margin: 0; }
    .enc-sub { font-size: 13px; color: #aaa; margin: 0; line-height: 1.5; }
    .enc-input { background: #333; border: 1px solid #555; border-radius: 4px; color: #fff; padding: 8px; font-size: 14px; width: 100%; box-sizing: border-box; }
    .enc-key { background: #0d0d0d; border: 1px solid #5865F2; border-radius: 4px; padding: 12px; font-family: monospace; font-size: 14px; color: #fff; word-break: break-all; user-select: all; }
    .enc-error { color: #f04747; font-size: 12px; margin: 0; min-height: 14px; }
    .enc-ack { display: flex; gap: 8px; align-items: flex-start; font-size: 12px; color: #ccc; line-height: 1.4; cursor: pointer; }
    .enc-check { margin-top: 2px; flex-shrink: 0; }
    .enc-link { background: none; border: none; color: #8a8aff; cursor: pointer; font-size: 13px; text-decoration: underline; padding: 0; text-align: left; }
    .enc-link-muted { color: #777; }
    .enc-divider { border-top: 1px solid #333; margin: 4px 0; }
    #room-list { display: flex; flex-direction: column; gap: 8px; }
    .room-section-title { margin: 12px 0 0; font-size: 12px; color: #888; text-transform: uppercase; letter-spacing: .5px; }
    .room-section-title:first-child { margin-top: 0; }
    .room-item { background: #222; border: 1px solid #333; border-radius: 4px; color: #fff; padding: 12px; cursor: pointer; text-align: left; font-size: 14px; }
    .room-item:hover { background: #2a2a2a; }
    .room-badge-owner { background: #5865F2; color: #fff; font-size: 10px; font-weight: bold; border-radius: 3px; padding: 2px 6px; margin-left: 8px; letter-spacing: .5px; text-transform: uppercase; vertical-align: middle; }
    .room-invite-row { display: flex; align-items: center; justify-content: space-between; gap: 10px; cursor: default; }
    .room-invite-name { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .room-accept-btn { padding: 6px 14px; font-size: 13px; flex-shrink: 0; }
    #create-progress { display: none; flex-direction: column; gap: 8px; background: #1a1a1a; border: 1px solid #333; border-radius: 4px; padding: 12px; }
    #create-progress-bar-track { background: #333; border-radius: 4px; height: 6px; width: 100%; overflow: hidden; }
    #create-progress-bar-fill { background: #5865F2; height: 6px; width: 0%; border-radius: 4px; transition: width .3s ease; }
    #create-progress-step { font-size: 11px; color: #666; }

    /* room-join loading view — shown the instant a room is clicked, while the
       full-history replay runs in the background (see openRoom in interface.js) */
    .room-loading-screen { display: flex; flex-direction: column; flex: 1; width: 100%; }
    .room-loading-screen .back-btn { align-self: flex-start; margin: 16px; }
    .room-loading { margin: auto; display: flex; flex-direction: column; align-items: center; gap: 14px; text-align: center; padding: 24px; }
    .room-loading-title { margin: 0; font-size: 20px; }
    .room-loading-bar-track { width: 220px; height: 6px; background: #333; border-radius: 4px; overflow: hidden; }
    .room-loading-bar-fill { width: 40%; height: 6px; background: #5865F2; border-radius: 4px; animation: room-loading-slide 1.1s ease-in-out infinite; }
    @keyframes room-loading-slide { 0% { margin-left: -40%; } 100% { margin-left: 100%; } }

    /* main (built by ui/interface.js) */
    #screen-main { padding: 0; height: 100vh; }
    .main-header { display: flex; align-items: center; gap: 12px; padding: 10px 14px; background: #222; border-bottom: 1px solid #333; flex-shrink: 0; }
    .main-header h2 { font-size: 16px; }
    .back-btn { background: #333; color: #aaa; border: none; border-radius: 4px; padding: 6px 12px; cursor: pointer; font-size: 13px; }
    .title-group { display: flex; align-items: center; gap: 10px; min-width: 0; }
    .rank-badge { background: #5865F2; color: #fff; font-size: 11px; font-weight: bold; border-radius: 3px; padding: 3px 8px; text-transform: uppercase; letter-spacing: .5px; }
    .room-code { font-size: 11px; color: #888; background: #1a1a1a; padding: 6px 10px; border-radius: 4px; max-width: 240px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .copy-btn { font-size: 11px; color: #cdcdcd; background: #232323; border: 1px solid #383838; padding: 5px 9px; border-radius: 4px; cursor: pointer; white-space: nowrap; transition: background .12s, color .12s; }
    .copy-btn:hover { background: #2e2e2e; }
    .copy-btn.copied { background: #1e3a24; color: #6ee787; border-color: #2c5234; }
    .copy-btn.icon-only { padding: 0; width: 26px; height: 26px; display: inline-flex; align-items: center; justify-content: center; font-size: 13px; line-height: 1; flex: 0 0 auto; }
    .my-identity { margin-left: auto; display: flex; align-items: center; gap: 8px; min-width: 0; }
    .my-id { font-size: 11px; color: #aaa; max-width: 220px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    /* owner upgrade control in the header */
    .upgrade-slot { display: flex; align-items: center; min-width: 0; }
    .upgrade-btn { background: #b8860b; color: #fff; border: none; border-radius: 4px; padding: 6px 12px; cursor: pointer; font-size: 12px; white-space: nowrap; }
    .upgrade-note { color: #888; font-size: 12px; white-space: nowrap; }
    .upgrade-bar { display: flex; align-items: center; gap: 8px; min-width: 220px; }
    .upgrade-bar-track { flex: 1; background: #333; border-radius: 4px; height: 6px; overflow: hidden; min-width: 120px; }
    .upgrade-bar-fill { background: #b8860b; height: 6px; width: 0%; border-radius: 4px; transition: width .3s ease; }
    .upgrade-bar-label { font-size: 11px; color: #aaa; white-space: nowrap; }

    /* three columns: queues | player | people + chat */
    .columns { display: flex; gap: 12px; padding: 12px; flex: 1; min-height: 0; align-items: stretch; }
    .column { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 14px; overflow-y: auto; }
    .column-mid { flex: 1.2; }
    .now-playing, .queue-panel, .roster, .chat, .settings, .logs, .upgrade-box { margin: 0; }

    .skip-row { display: flex; justify-content: space-between; align-items: center; gap: 10px; margin-bottom: 6px; }
    .video-title { min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-size: 13px; }
    .skip-btn { background: #5865F2; color: #fff; border: none; border-radius: 4px; padding: 7px 16px; cursor: pointer; font-size: 13px; flex-shrink: 0; }
    .skip-btn:disabled { background: #333; color: #666; cursor: default; }
    #yt-player { width: 100%; min-height: 220px; background: #000; border-radius: 6px; }
    /* Playback progress bar — thin button-blue fill, glides via JS rAF loop */
    .progress-bar { width: 100%; height: 4px; background: #2a2a2a; border-radius: 2px; overflow: hidden; margin-top: 6px; visibility: hidden; }
    .progress-fill { height: 100%; width: 0%; background: #5865F2; border-radius: 2px; }
    .np-label { margin-top: 6px; }
    .skip-note { min-height: 16px; font-size: 12px; color: #e0a030; margin-top: 4px; }
    .playback-controls { display: flex; align-items: center; justify-content: space-between; gap: 10px; margin-top: 10px; }
    .reset-btn { padding: 6px 12px; font-size: 12px; }
    .volume-group { display: flex; align-items: center; gap: 8px; margin-left: auto; }
    .mute-btn { background: #333; border: none; border-radius: 4px; padding: 4px 8px; cursor: pointer; font-size: 14px; line-height: 1; }
    .volume-slider { width: 100px; }

    .tabs { display: flex; gap: 6px; margin-bottom: 8px; }
    .tab { background: #222; color: #aaa; border: 1px solid #333; border-radius: 4px; padding: 6px 14px; cursor: pointer; font-size: 13px; }
    .tab.active { background: #5865F2; color: #fff; border-color: #5865F2; }
    .queue-body { display: flex; flex-direction: column; gap: 6px; }
    .rot-item, .uq-item, .person { display: flex; align-items: center; gap: 10px; background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 4px; padding: 8px 10px; font-size: 13px; }
    .rot-item.playing { border-color: #5865F2; }
    .who { font-weight: bold; color: #cfd3ff; min-width: 80px; }
    .song { color: #ccc; word-break: break-all; }
    .rot-actions, .uq-actions { margin-left: auto; display: flex; gap: 4px; }
    .mini { background: #333; color: #ccc; border: none; border-radius: 3px; padding: 2px 8px; cursor: pointer; font-size: 12px; }
    .danger { align-self: flex-start; background: #5a2230; color: #ffb3c0; border: 1px solid #7a3145; border-radius: 4px; padding: 6px 12px; cursor: pointer; font-size: 12px; margin-top: 6px; }
    .uq-add, .invite-row { display: flex; gap: 8px; margin-bottom: 6px; }
    .uq-input, .invite-input { flex: 1; min-width: 0; background: #333; border: 1px solid #555; border-radius: 4px; color: #fff; padding: 8px; font-size: 13px; }
    .uq-add button, .invite-btn { background: #5865F2; color: #fff; border: none; border-radius: 4px; padding: 8px 14px; cursor: pointer; font-size: 13px; }
    .uq-note { min-height: 16px; }
    .uq-section { font-size: 10px; text-transform: uppercase; letter-spacing: .05em; color: #777; margin: 10px 0 4px; }
    .uq-item.declared { border-color: #3a4a6a; }
    .join-btn { background: #2e7d32; color: #fff; border: none; border-radius: 4px; padding: 8px 16px; cursor: pointer; font-size: 13px; }
    .join-btn.active { background: #5a2230; }
    .join-btn.dropped { background: #8a5a00; }
    .join-btn.refilling { background: #2a4d6e; }
    .join-btn:disabled { opacity: 0.45; cursor: not-allowed; }

    .roster-box { display: flex; flex-direction: column; gap: 6px; margin: 8px 0; }
    .right-panel { flex: 1; display: flex; flex-direction: column; min-height: 0; }
    .roster { flex: 1; display: flex; flex-direction: column; min-height: 0; }
    .rank-tag { margin-left: auto; color: #888; font-size: 12px; }
    .rank-select { background: #333; border: 1px solid #555; border-radius: 4px; color: #fff; padding: 4px; font-size: 12px; }

    .chat { flex: 1; display: flex; flex-direction: column; gap: 8px; min-height: 0; }
    .chat-messages { flex: 1; min-height: 120px; overflow-y: auto; display: flex; flex-direction: column; gap: 4px; background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 6px; padding: 10px; }
    .chat-msg { font-size: 13px; line-height: 1.4; word-break: break-word; }
    .sender { color: #5865F2; font-weight: bold; margin-right: 6px; }
    .chat-input-row { display: flex; gap: 8px; }
    .chat-input { flex: 1; min-width: 0; background: #333; border: 1px solid #555; border-radius: 4px; color: #fff; padding: 8px; font-size: 13px; }
    .chat-input-row button { background: #5865F2; color: #fff; border: none; border-radius: 4px; padding: 8px 14px; cursor: pointer; }

    /* Room settings tab */
    .settings { flex: 1; display: flex; flex-direction: column; min-height: 0; overflow-y: auto; }
    .settings-box { display: flex; flex-direction: column; gap: 6px; }
    .set-row { display: flex; flex-direction: column; gap: 6px; background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 6px; padding: 10px; }
    .set-label { font-size: 13px; color: #ccc; }
    .set-opts { display: flex; gap: 6px; flex-wrap: wrap; }
    .set-opt { background: #222; color: #aaa; border: 1px solid #333; border-radius: 4px; padding: 6px 12px; cursor: pointer; font-size: 12px; }
    .set-opt.active { background: #5865F2; color: #fff; border-color: #5865F2; }
    .set-opt:disabled { cursor: default; }
    .set-opt.active:disabled { opacity: 1; }
    .set-opt:disabled:not(.active) { opacity: 0.4; }
    .set-hint { font-size: 11px; color: #888; font-style: italic; }

    /* Logs tab (relocated debug log): this session green, older sessions grey */
    .logs { flex: 1; display: flex; flex-direction: column; min-height: 0; }
    .logs-box { flex: 1; min-height: 120px; overflow-y: auto; background: #000; border: 1px solid #2a2a2a; border-radius: 6px; padding: 8px; font-size: 11px; display: flex; flex-direction: column; gap: 1px; }
    .log-line { white-space: pre-wrap; word-break: break-word; font-family: monospace; }
    .log-line.fresh { color: #6c7; }
    .log-line.old { color: #666; }
  </style>
</head>
<body>

<script src="https://www.youtube.com/iframe_api"></script>

<!-- LOGIN -->
<div id="screen-login" class="screen">
  <div class="login-box">
    <h2>DDJP</h2>
    <p>Decentralized DJ Protocol</p>
    <input id="input-homeserver" type="text" value="https://matrix.org" />
    <input id="input-username" type="text" placeholder="@username:matrix.org" />
    <input id="input-password" type="password" placeholder="Password" />
    <p id="login-error">Login failed. Check your credentials.</p>
    <button id="btn-login">Log in with Matrix</button>
  </div>
</div>

<!-- ENCRYPTION / RECOVERY KEY (built by ui/interface.js) -->
<div id="screen-encryption" class="screen"></div>

<!-- ROOM SELECTOR -->
<div id="screen-rooms" class="screen">
  <div style="display:flex; justify-content:space-between; align-items:center;">
    <h2>DDJP Rooms</h2>
    <div style="display:flex; align-items:center; gap:8px;">
      <!-- viewer's own Matrix ID + copy button, filled by interface.js -->
      <span id="rooms-identity" style="display:flex; align-items:center; gap:8px;"></span>
      <button id="btn-logout" class="btn-secondary">Log out</button>
    </div>
  </div>
  <div id="create-room-section" style="display:flex; flex-direction:column; gap:8px;">
    <div class="room-actions">
      <input id="input-room-name" placeholder="Room name..." />
      <button class="btn-primary" id="btn-create-room">Create Room</button>
    </div>
    <div id="create-progress">
      <div class="muted">Creating room channels...</div>
      <div id="create-progress-bar-track"><div id="create-progress-bar-fill"></div></div>
      <div id="create-progress-step"></div>
      <div id="create-error" style="display:none; color:#e06c6c; font-size:12px;"></div>
      <button class="btn-secondary" id="btn-create-retry" style="display:none;">Resume creating</button>
    </div>
  </div>
  <div class="room-actions">
    <input id="input-join-code" placeholder="Paste Space ID to join..." />
    <button class="btn-secondary" id="btn-join-room">Join Room</button>
  </div>
  <h3 style="margin-top:8px">Recent Rooms</h3>
  <div id="room-list"></div>
</div>

<!-- MAIN (contents built by ui/interface.js) -->
<div id="screen-main" class="screen"></div>


<!-- Load order matters: no dependencies first, then dependents. -->
<!-- Logger first: it installs console redaction before the SDK can log anything. -->
<script src="core/logger.js"></script>

<!-- Vendored matrix-js-sdk 41.8.0 + Rust crypto WASM (see tools/VENDOR_PROVENANCE.md). -->
<!-- Exposes the global `matrixcs`; the crypto WASM loads on demand via matrixcs.loadCrypto(). -->
<script src="lib/matrix-sdk.bundle.js"></script>

<!-- Core — no dependencies between these -->
<script src="core/storageio.js"></script>
<script src="core/idb.js"></script>
<script src="core/store.js"></script>
<script src="core/eventcache.js"></script>
<script src="core/statederiver.js"></script>
<script src="core/streammanager.js"></script>
<script src="core/blockmanager.js"></script>
<script src="core/windowedlist.js"></script>

<!-- Transport — depends on core -->
<script src="transport/matrixbridge.js"></script>

<!-- Features — depend on transport + core. roomupgrade + userqueue load before room.js, which inits them. -->
<script src="features/queue.js"></script>
<script src="features/skip.js"></script>
<script src="features/playback.js"></script>
<script src="features/chat.js"></script>
<script src="features/media.js"></script>
<script src="features/roomupgrade.js"></script>
<script src="features/userqueue.js"></script>
<script src="features/room.js"></script>

<!-- UI — depends on everything above -->
<script src="ui/interface.js"></script>

<script src="app.js"></script>

</body>
</html>
